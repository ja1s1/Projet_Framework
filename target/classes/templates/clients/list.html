<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste Candidats</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h2>Liste des clients</h2>
        </div>

        <p>
            <a class="badge" href="/">Accueil</a>
            <a class="badge success" href="/clients/new">Ajouter</a>
        </p>



        <table border="1">
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Contact</th>
                <th>Action</th>
            </tr>

            <tr th:each="c : ${clients}">
                <td th:text="${c.idClient}"></td>
                <td th:text="${c.nom}"></td>
                <td th:text="${c.contact}"></td>

                <td>
                    <a class="badge primary" th:href="@{/clients/edit/{id}(id=${c.idClient})}">Edit</a>
                    <a class="badge danger" th:href="@{/clients/delete/{id}(id=${c.idClient})}">Delete</a>
                </td>

            </tr>

        </table>

    </div>

</body>
</html>
