<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Formulaire Candidat</title>
	<link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>

<div class="card">
	<div class="card-header">
		<h2>Formulaire Candidat</h2>
	</div>

	<p><a class="badge" href="/clients">Retour liste</a></p>

	<form th:action="@{/clients/save}" th:object="${client}" method="post">

	<div>
		<label>Nom</label>
		<input type="text" th:field="*{nom}" />
	</div>
	<div>
		<label>Contact</label>
		<input type="text" th:field="*{contact}" />
	</div>

	<button class="success" type="submit">Enregistrer</button>
	</form>

</div>

</body>
</html>
